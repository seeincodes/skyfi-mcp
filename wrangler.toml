name = "skyfi-mcp"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SKYFI_API_BASE_URL = "https://app.skyfi.com/platform-api"
SKYFI_API_VERSION = "2026-03"
SKYFI_SIMULATE = "false"

# Token store requires Workers KV
# Create with: wrangler kv namespace create SKYFI_TOKENS
[[kv_namespaces]]
binding = "SKYFI_TOKENS"
id = "" # Set after running wrangler kv namespace create
